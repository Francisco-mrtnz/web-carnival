<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolling Dice</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Trebuchet MS", Verdana, sans-serif; color: #fff; background: linear-gradient(135deg, #FF6B35, #F7931E); display: grid; place-items: center; padding: 20px; }
    .container { width: min(980px, 100%); background: rgba(0,0,0,0.3); border-radius: 20px; border: 3px solid #fff; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
    h1 { margin: 0; font-size: 2rem; }
    .stats { display: flex; gap: 15px; font-weight: bold; }
    canvas { width: 100%; height: auto; background: #FFF8DC; border-radius: 10px; display: block; margin: 15px 0; cursor: pointer; }
    .footer { display: flex; justify-content: space-between; gap: 15px; font-weight: bold; }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content { background: #fff; border-radius: 15px; padding: 30px; text-align: center; color: #333; max-width: 400px; }
    .modal-content h2 { margin: 0 0 15px; color: #FF6B35; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 1rem; font-weight: bold; border: 0; border-radius: 10px; background: #FF6B35; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎲 Rolling Dice</h1>
      <div class="stats">
        <span>Total: <span id="score">0</span></span>
        <span>Rolls: <span id="counter">0</span></span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Click to roll! Get highest total before 10 rolls!</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="result">Game Over!</h2>
      <p>Final Total: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const counterEl = document.getElementById('counter');
    const resultEl = document.getElementById('result');
    const finalScoreEl = document.getElementById('finalScore');
    const modalEl = document.getElementById('modal');

    let total = 0;
    let rolls = 0;
    let gameActive = true;
    let diceRolling = false;
    let diceValues = [1, 2, 3];
    let diceRotations = [0, 0, 0];
    let rollStartTime = 0;

    class Dice {
      constructor(x, r) {
        this.x = x;
        this.y = 260;
        this.size = 70;
        this.rotation = r;
        this.value = 1;
      }

      update(rotation) {
        this.rotation = rotation;
        this.value = Math.floor((rotation / (Math.PI * 2)) * 6) % 6 + 1;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        ctx.fillStyle = '#FFF';
        ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);

        ctx.fillStyle = '#000';
        const dotRadius = 4;
        const positions = [
          [[-8, -8]],
          [[-12, -12], [12, 12]],
          [[-12, -12], [0, 0], [12, 12]],
          [[-12, -12], [-12, 12], [12, -12], [12, 12]],
          [[-12, -12], [-12, 12], [0, 0], [12, -12], [12, 12]],
          [[-12, -12], [-12, 0], [-12, 12], [12, -12], [12, 0], [12, 12]]
        ];

        for (let pos of positions[this.value - 1]) {
          ctx.beginPath();
          ctx.arc(pos[0], pos[1], dotRadius, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }
    }

    const dices = [
      new Dice(230, 0),
      new Dice(460, 0),
      new Dice(690, 0)
    ];

    function rollDice() {
      if (diceRolling || !gameActive) return;
      diceRolling = true;
      rollStartTime = Date.now();

      rolls++;
      counterEl.textContent = rolls;

      for (let dice of dices) {
        dice.rotation = Math.random() * Math.PI * 4;
      }

      const rollDuration = 600;

      function animate() {
        const elapsed = Date.now() - rollStartTime;
        const progress = Math.min(elapsed / rollDuration, 1);

        for (let i = 0; i < dices.length; i++) {
          const finalRotation = Math.random() * Math.PI * 2;
          dices[i].update(dices[i].rotation + progress * finalRotation);
          diceValues[i] = dices[i].value;
        }

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          diceRolling = false;
          total += diceValues.reduce((a, b) => a + b, 0);
          scoreEl.textContent = total;

          if (rolls >= 10) {
            gameActive = false;
            finalScoreEl.textContent = total;
            if (total > 100) resultEl.textContent = '🎉 Jackpot!';
            else if (total > 70) resultEl.textContent = '🌟 Great!';
            modalEl.classList.add('open');
          }
        }
      }

      requestAnimationFrame(animate);
    }

    function draw() {
      ctx.fillStyle = '#FFF8DC';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let dice of dices) {
        dice.draw(ctx);
      }

      ctx.fillStyle = '#000';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(gameActive && !diceRolling ? 'Click to roll!' : diceRolling ? 'Rolling...' : '', 460, 50);
    }

    function gameLoop() {
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('click', rollDice);
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
