<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catch Eggs</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Trebuchet MS", Verdana, sans-serif; color: #fff; background: linear-gradient(135deg, #FF6B9D, #C44569); display: grid; place-items: center; padding: 20px; }
    .container { width: min(980px, 100%); background: rgba(0,0,0,0.3); border-radius: 20px; border: 3px solid #fff; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
    h1 { margin: 0; font-size: 2rem; }
    .stats { display: flex; gap: 15px; font-weight: bold; }
    canvas { width: 100%; height: auto; background: linear-gradient(180deg, #87CEEB, #E0F6FF); border-radius: 10px; display: block; margin: 15px 0; }
    .footer { display: flex; justify-content: space-between; gap: 15px; font-weight: bold; }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content { background: #fff; border-radius: 15px; padding: 30px; text-align: center; color: #333; max-width: 400px; }
    .modal-content h2 { margin: 0 0 15px; color: #FF6B9D; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 1rem; font-weight: bold; border: 0; border-radius: 10px; background: #FF6B9D; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🥚 Catch Eggs</h1>
      <div class="stats">
        <span>Caught: <span id="score">0</span></span>
        <span>Time: <span id="timer">30</span>s</span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Move mouse to catch eggs!</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Time's Up!</h2>
      <p>Caught: <span id="finalScore">0</span> eggs</p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const finalScoreEl = document.getElementById('finalScore');
    const modalEl = document.getElementById('modal');

    let score = 0;
    let timeLeft = 30;
    let gameActive = true;
    let startTime = Date.now();
    let lastFrame = Date.now();
    let mouseX = 460;
    let mouseY = 500;
    let eggs = [];

    class Egg {
      constructor() {
        this.x = Math.random() * (canvas.width - 40) + 20;
        this.y = -20;
        this.w = 15;
        this.h = 20;
        this.vy = Math.random() * 80 + 100;
      }

      update(dt) {
        this.y += this.vy * dt;
      }

      draw(ctx) {
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.ellipse(this.x, this.y, this.w, this.h, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#DAA520';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#FFF8DC';
        ctx.fillRect(this.x - 3, this.y - 5, 6, 8);
      }

      isOffScreen() {
        return this.y > canvas.height;
      }

      checkCatch(bx, by, br) {
        const dx = this.x - bx;
        const dy = this.y - by;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < br + this.w;
      }
    }

    function update(dt) {
      if (!gameActive) return;

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timeLeft = Math.max(0, 30 - elapsed);
      timerEl.textContent = timeLeft;

      if (timeLeft === 0) {
        gameActive = false;
        finalScoreEl.textContent = score;
        modalEl.classList.add('open');
        return;
      }

      for (let egg of eggs) {
        egg.update(dt);
        if (egg.checkCatch(mouseX, mouseY, 40)) {
          score++;
          scoreEl.textContent = score;
          eggs = eggs.filter(e => e !== egg);
        }
      }

      eggs = eggs.filter(e => !e.isOffScreen());

      if (Math.random() < 0.05) {
        eggs.push(new Egg());
      }
    }

    function draw() {
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Basket
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(mouseX - 40, mouseY, 80, 30);
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 2;
      ctx.strokeRect(mouseX - 40, mouseY, 80, 30);

      // Basket weave
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.moveTo(mouseX - 40 + i * 10, mouseY);
        ctx.lineTo(mouseX - 40 + i * 10, mouseY + 30);
        ctx.stroke();
      }

      for (let egg of eggs) {
        egg.draw(ctx);
      }
    }

    function gameLoop() {
      const now = Date.now();
      const dt = (now - lastFrame) / 1000;
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
      mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
      mouseY = Math.min(mouseY, canvas.height - 40);
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
