<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skee Ball Rush</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      min-height: 100vh; 
      font-family: "Trebuchet MS", Verdana, sans-serif; 
      color: #fff;
      background: linear-gradient(135deg, #1abc9c 0%, #16a085 50%, #2ecc71 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .container {
      width: min(980px, 100%);
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      border: 3px solid #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 { margin: 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .stats {
      display: flex;
      gap: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    canvas {
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #e8f8f5 0%, #fff 100%);
      border-radius: 10px;
      display: block;
      margin: 15px 0;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .info {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      font-size: 1rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-weight: bold;
    }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      color: #333;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .modal-content h2 { margin: 0 0 15px; color: #1abc9c; font-size: 1.8rem; }
    .modal-content p { margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border: 0;
      border-radius: 10px;
      background: #1abc9c;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #0d9c8f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚾ Skee Ball Rush</h1>
      <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span>Balls: <span id="balls">10</span></span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="info">Roll balls down the ramp into the scoring holes!</div>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Goal: 1000 pts</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Final Score: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const ballsEl = document.getElementById('balls');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let ballsLeft = 10;
    let gameActive = true;
    let ball = null;
    let dragging = false;
    let dragStart = null;
    let lastFrame = Date.now();

    const launcher = { x: 460, y: 450, r: 25 };
    const gravity = 1000;
    const ballRadius = 8;

    // Scoring holes
    const holes = [
      { x: 200, y: 120, points: 50, r: 20, color: '#e74c3c' },
      { x: 460, y: 80, points: 100, r: 20, color: '#f39c12' },
      { x: 720, y: 120, points: 50, r: 20, color: '#e74c3c' },
      { x: 150, y: 200, points: 30, r: 18, color: '#95a5a6' },
      { x: 460, y: 180, points: 200, r: 22, color: '#f1c40f' },
      { x: 770, y: 200, points: 30, r: 18, color: '#95a5a6' }
    ];

    class Ball {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = ballRadius;
      }

      update(dt) {
        this.vy += gravity * dt * 0.5;
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.8; }
        if (this.x + this.r > canvas.width) { this.x = canvas.width - this.r; this.vx *= -0.8; }
        if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.8; }
      }

      draw(ctx) {
        const grad = ctx.createRadialGradient(this.x - 3, this.y - 3, 2, this.x, this.y, this.r);
        grad.addColorStop(0, '#3498db');
        grad.addColorStop(1, '#2980b9');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
      }

      isOutOfBounds() {
        return this.y > canvas.height + 100 || this.x < -50 || this.x > canvas.width + 50;
      }

      checkHoles() {
        for (let hole of holes) {
          const dx = this.x - hole.x;
          const dy = this.y - hole.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < hole.r) {
            return hole;
          }
        }
        return null;
      }
    }

    function launchBall(fromX, fromY, toX, toY) {
      if (ball || ballsLeft <= 0) return;
      const dx = toX - fromX;
      const dy = toY - fromY;
      const speed = Math.sqrt(dx * dx + dy * dy) * 1.2;
      const angle = Math.atan2(dy, dx);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed * 0.7;
      ball = new Ball(fromX, fromY, vx, vy);
      ballsLeft--;
      ballsEl.textContent = ballsLeft;
    }

    function update(dt) {
      if (!gameActive) return;

      if (ballsLeft === 0 && !ball) {
        endGame();
        return;
      }

      if (ball) {
        ball.update(dt);

        const hole = ball.checkHoles();
        if (hole) {
          score += hole.points;
          scoreEl.textContent = score;
          ball = null;
        }

        if (ball && ball.isOutOfBounds()) {
          ball = null;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw ramp background
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw ramp with perspective
      ctx.fillStyle = '#cd853f';
      ctx.beginPath();
      ctx.moveTo(100, 450);
      ctx.lineTo(820, 450);
      ctx.lineTo(780, 100);
      ctx.lineTo(140, 100);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#8b4513';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Draw ramp lanes
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const startX = 100 + (720 / 6) * i;
        const endX = 140 + (640 / 6) * i;
        ctx.beginPath();
        ctx.moveTo(startX, 450);
        ctx.lineTo(endX, 100);
        ctx.stroke();
      }

      // Draw scoring holes
      for (let hole of holes) {
        ctx.fillStyle = hole.color;
        ctx.beginPath();
        ctx.arc(hole.x, hole.y, hole.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(hole.points, hole.x, hole.y);
      }

      // Draw launcher
      ctx.fillStyle = '#654321';
      ctx.fillRect(launcher.x - launcher.r, launcher.y - launcher.r, launcher.r * 2, launcher.r * 2);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(launcher.x - launcher.r, launcher.y - launcher.r, launcher.r * 2, launcher.r * 2);

      if (ball) {
        ball.draw(ctx);
      }
    }

    function endGame() {
      gameActive = false;
      finalScoreEl.textContent = score;
      modalEl.classList.add('open');
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!gameActive || ball) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const dx = x - launcher.x;
      const dy = y - launcher.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < launcher.r * 1.5) {
        dragging = true;
        dragStart = { x, y };
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragStart) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        launchBall(launcher.x, launcher.y, x, y);
        dragging = false;
        dragStart = null;
      }
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
