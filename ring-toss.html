<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ring Toss</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      min-height: 100vh; 
      font-family: "Trebuchet MS", Verdana, sans-serif; 
      color: #fff;
      background: linear-gradient(135deg, #ff9a56 0%, #ff6b6b 50%, #ee5a6f 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .container {
      width: min(980px, 100%);
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      border: 3px solid #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 { margin: 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .stats {
      display: flex;
      gap: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    canvas {
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #fff4e6 0%, #ffe5cc 100%);
      border-radius: 10px;
      display: block;
      margin: 15px 0;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .info {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      font-size: 1rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-weight: bold;
    }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      color: #333;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .modal-content h2 { margin: 0 0 15px; color: #ff9a56; font-size: 1.8rem; }
    .modal-content p { margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border: 0;
      border-radius: 10px;
      background: #ff9a56;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #ff8040; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💍 Ring Toss</h1>
      <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span>Rings: <span id="rings">8</span></span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="info">Toss rings onto the bottle necks!</div>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Goal: 5 rings on</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Rings On: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const ringsEl = document.getElementById('rings');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let rings = 8;
    let gameActive = true;
    let ring = null;
    let dragging = false;
    let dragStart = null;
    let lastFrame = Date.now();
    let bottles = [];
    let ringsOnBottles = [];

    const tray = { x: 100, y: 450, r: 30 };
    const gravity = 800;

    class Bottle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.neckRadius = 8;
        this.ringOnIt = false;
      }

      draw(ctx) {
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(this.x - 15, this.y - 30, 30, 40);
        ctx.fillRect(this.x - 12, this.y - 35, 24, 8);

        ctx.strokeStyle = '#654321';
        ctx.lineWidth = 1;
        ctx.strokeRect(this.x - 15, this.y - 30, 30, 40);
      }
    }

    class Ring {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = 15;
        this.rotation = 0;
        this.rotationSpeed = Math.random() * 0.2 + 0.1;
        this.onBottle = false;
      }

      update(dt) {
        if (this.onBottle) return;

        this.vy += gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.rotation += this.rotationSpeed;

        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.7; }
        if (this.x + this.r > canvas.width) { this.x = canvas.width - this.r; this.vx *= -0.7; }
        if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.7; }
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }

      isOutOfBounds() {
        return this.y > canvas.height + 50;
      }

      checkBottles() {
        for (let bottle of bottles) {
          const dx = this.x - bottle.x;
          const dy = this.y - bottle.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < bottle.neckRadius + this.r * 0.5 && this.y > bottle.y - 20) {
            return bottle;
          }
        }
        return null;
      }
    }

    function throwRing(fromX, fromY, toX, toY) {
      if (ring || rings <= 0) return;
      const dx = toX - fromX;
      const dy = toY - fromY;
      const speed = Math.sqrt(dx * dx + dy * dy) * 0.9;
      const angle = Math.atan2(dy, dx);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      ring = new Ring(fromX, fromY, vx, vy);
      rings--;
      ringsEl.textContent = rings;
    }

    function update(dt) {
      if (!gameActive) return;

      if (rings === 0 && !ring) {
        endGame();
        return;
      }

      if (ring) {
        ring.update(dt);

        const bottle = ring.checkBottles();
        if (bottle && !bottle.ringOnIt) {
          ring.onBottle = true;
          ring.x = bottle.x;
          ring.y = bottle.y - 2;
          ring.vx = 0;
          ring.vy = 0;
          bottle.ringOnIt = true;
          score++;
          scoreEl.textContent = score;
          ringsOnBottles.push(ring);
          ring = null;
        }

        if (ring && ring.isOutOfBounds()) {
          ring = null;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw grass
      ctx.fillStyle = '#90EE90';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw bottles
      for (let bottle of bottles) {
        bottle.draw(ctx);
      }

      // Draw rings on bottles
      for (let r of ringsOnBottles) {
        r.draw(ctx);
      }

      // Draw active ring
      if (ring) {
        ring.draw(ctx);
      }

      // Draw tray
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(tray.x - tray.r, tray.y - tray.r, tray.r * 2, tray.r * 2);
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 2;
      ctx.strokeRect(tray.x - tray.r, tray.y - tray.r, tray.r * 2, tray.r * 2);
    }

    function endGame() {
      gameActive = false;
      finalScoreEl.textContent = score;
      modalEl.classList.add('open');
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!gameActive || ring) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const dx = x - tray.x;
      const dy = y - tray.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < tray.r * 1.5) {
        dragging = true;
        dragStart = { x, y };
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragStart) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        throwRing(tray.x, tray.y, x, y);
        dragging = false;
        dragStart = null;
      }
    });

    // Create bottles
    for (let i = 0; i < 5; i++) {
      bottles.push(new Bottle(250 + i * 120, 280));
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
