<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketball Shootout</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      min-height: 100vh; 
      font-family: "Trebuchet MS", Verdana, sans-serif; 
      color: #fff;
      background: linear-gradient(135deg, #1e90ff 0%, #32cd32 50%, #ffa500 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .container {
      width: min(980px, 100%);
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      border: 3px solid #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 { margin: 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .stats {
      display: flex;
      gap: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    canvas {
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #e8f4f8 0%, #fff 100%);
      border-radius: 10px;
      display: block;
      margin: 15px 0;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .info {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      font-size: 1rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-weight: bold;
    }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      color: #333;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .modal-content h2 { margin: 0 0 15px; color: #ff6b00; font-size: 1.8rem; }
    .modal-content p { margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border: 0;
      border-radius: 10px;
      background: #ff6b00;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #ff5000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏀 Basketball Shootout</h1>
      <div class="stats">
        <span>Made: <span id="score">0</span></span>
        <span>Time: <span id="timer">60</span>s</span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="info">Drag from the rack to shoot. Make 8 baskets!</div>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Goal: 8 shots</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Made Shots: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let timeLeft = 60;
    let gameActive = true;
    let ball = null;
    let dragging = false;
    let dragStart = null;
    let startTime = Date.now();
    let lastFrame = Date.now();

    const ballRack = { x: 120, y: 450, r: 35 };
    const hoop = { x: 750, y: 200, r: 25 };
    const gravity = 900;
    const ballRadius = 12;

    class Ball {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = ballRadius;
      }

      update(dt) {
        this.vy += gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.8; }
        if (this.x + this.r > canvas.width) { this.x = canvas.width - this.r; this.vx *= -0.8; }
        if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.8; }
      }

      draw(ctx) {
        const grad = ctx.createRadialGradient(this.x - 5, this.y - 5, 2, this.x, this.y, this.r);
        grad.addColorStop(0, '#ffcc00');
        grad.addColorStop(1, '#ff9900');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      isOutOfBounds() {
        return this.y > canvas.height + 100;
      }

      checkHoop() {
        const dx = this.x - hoop.x;
        const dy = this.y - hoop.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return dist < hoop.r + this.r && this.vy > 0;
      }
    }

    function throwBall(fromX, fromY, toX, toY) {
      if (ball) return;
      const dx = toX - fromX;
      const dy = toY - fromY;
      const speed = Math.sqrt(dx * dx + dy * dy) * 1.1;
      const angle = Math.atan2(dy, dx);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      ball = new Ball(fromX, fromY, vx, vy);
    }

    function update(dt) {
      if (!gameActive) return;

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timeLeft = Math.max(0, 60 - elapsed);
      timerEl.textContent = timeLeft;

      if (timeLeft === 0) {
        endGame();
        return;
      }

      if (ball) {
        ball.update(dt);

        if (ball.checkHoop()) {
          score++;
          scoreEl.textContent = score;
          ball = null;
        }

        if (ball && ball.isOutOfBounds()) {
          ball = null;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw court
      ctx.fillStyle = '#d2691e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw court lines
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.strokeRect(50, 100, canvas.width - 100, canvas.height - 150);

      // Draw hoop
      ctx.fillStyle = '#ff6b00';
      ctx.beginPath();
      ctx.arc(hoop.x, hoop.y + 40, 8, 0, Math.PI * 2);
      ctx.fill();

      // Draw rim
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(hoop.x, hoop.y, hoop.r, 0, Math.PI * 2);
      ctx.stroke();

      // Draw backboard
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(hoop.x - 50, hoop.y - 60, 100, 90);

      // Draw rack
      ctx.fillStyle = '#654321';
      ctx.fillRect(ballRack.x - ballRack.r, ballRack.y - ballRack.r, ballRack.r * 2, ballRack.r * 2);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(ballRack.x - ballRack.r, ballRack.y - ballRack.r, ballRack.r * 2, ballRack.r * 2);

      if (ball) {
        ball.draw(ctx);
      }
    }

    function endGame() {
      gameActive = false;
      finalScoreEl.textContent = score;
      modalEl.classList.add('open');
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!gameActive || ball) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const dx = x - ballRack.x;
      const dy = y - ballRack.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ballRack.r * 1.5) {
        dragging = true;
        dragStart = { x, y };
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragStart) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        throwBall(ballRack.x, ballRack.y, x, y);
        dragging = false;
        dragStart = null;
      }
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
