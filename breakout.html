<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breakout</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Trebuchet MS", Verdana, sans-serif; color: #fff; background: linear-gradient(135deg, #667eea, #764ba2); display: grid; place-items: center; padding: 20px; }
    .container { width: min(980px, 100%); background: rgba(0,0,0,0.3); border-radius: 20px; border: 3px solid #fff; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
    h1 { margin: 0; font-size: 2rem; }
    .stats { display: flex; gap: 15px; font-weight: bold; }
    canvas { width: 100%; height: auto; background: #1a1a2e; border-radius: 10px; display: block; margin: 15px 0; }
    .footer { display: flex; justify-content: space-between; gap: 15px; font-weight: bold; }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content { background: #fff; border-radius: 15px; padding: 30px; text-align: center; color: #333; max-width: 400px; }
    .modal-content h2 { margin: 0 0 15px; color: #667eea; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 1rem; font-weight: bold; border: 0; border-radius: 10px; background: #667eea; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ Breakout</h1>
      <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span>Lives: <span id="lives">3</span></span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Move mouse to control paddle!</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Score: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let lives = 3;
    let gameOver = false;
    let bricks = [];
    let ball = { x: 460, y: 400, vx: 200, vy: -300, r: 8 };
    let paddle = { x: 400, y: 480, w: 120, h: 15 };
    let mouseX = canvas.width / 2;
    let lastFrame = Date.now();

    // Create bricks
    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 8; col++) {
        bricks.push({
          x: 40 + col * 110,
          y: 30 + row * 35,
          w: 100,
          h: 30,
          hit: false,
          color: ['#ff6b6b', '#4ecdc4', '#45b7d1'][row]
        });
      }
    }

    function update(dt) {
      if (gameOver) return;

      paddle.x = mouseX - paddle.w / 2;
      paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));

      ball.x += ball.vx * dt;
      ball.y += ball.vy * dt;

      // Walls
      if (ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.vx *= -1;
      if (ball.y - ball.r < 0) ball.vy *= -1;

      // Paddle
      if (ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h &&
          ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
        ball.vy = -Math.abs(ball.vy);
        const diff = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        ball.vx = diff * 300;
      }

      // Bricks
      for (let brick of bricks) {
        if (brick.hit) continue;
        if (ball.x > brick.x && ball.x < brick.x + brick.w &&
            ball.y > brick.y && ball.y < brick.y + brick.h) {
          brick.hit = true;
          score += 10;
          scoreEl.textContent = score;
          ball.vy *= -1;
        }
      }

      if (ball.y > canvas.height) {
        lives--;
        livesEl.textContent = lives;
        if (lives <= 0) {
          gameOver = true;
          finalScoreEl.textContent = score;
          modalEl.classList.add('open');
        } else {
          ball = { x: 460, y: 400, vx: 200, vy: -300, r: 8 };
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Bricks
      for (let brick of bricks) {
        if (!brick.hit) {
          ctx.fillStyle = brick.color;
          ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
        }
      }

      // Paddle
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

      // Ball
      ctx.fillStyle = '#00FF00';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
