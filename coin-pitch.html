<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Pitch</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      min-height: 100vh; 
      font-family: "Trebuchet MS", Verdana, sans-serif; 
      color: #fff;
      background: linear-gradient(135deg, #9370db 0%, #ff6b9d 50%, #ffa500 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .container {
      width: min(980px, 100%);
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      border: 3px solid #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 { margin: 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .stats {
      display: flex;
      gap: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    canvas {
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #90ee90 0%, #fff 100%);
      border-radius: 10px;
      display: block;
      margin: 15px 0;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .info {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      font-size: 1rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-weight: bold;
    }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      color: #333;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .modal-content h2 { margin: 0 0 15px; color: #9370db; font-size: 1.8rem; }
    .modal-content p { margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border: 0;
      border-radius: 10px;
      background: #9370db;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #7850bb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🪙 Coin Pitch</h1>
      <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span>Coins: <span id="coins">10</span></span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="info">Pitch coins into the cups! Land in cups to score.</div>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Goal: 500 pts</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Final Score: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const coinsEl = document.getElementById('coins');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let coins = 10;
    let gameActive = true;
    let coin = null;
    let dragging = false;
    let dragStart = null;
    let lastFrame = Date.now();

    const tray = { x: 100, y: 450, r: 30 };
    const gravity = 900;
    const coinRadius = 8;
    
    const cupPositions = [
      { x: 200, y: 250, points: 10, color: '#ff6b6b' },
      { x: 400, y: 200, points: 25, color: '#4ecdc4' },
      { x: 600, y: 250, points: 15, color: '#45b7d1' },
      { x: 800, y: 200, points: 30, color: '#f9ca24' }
    ];

    class Coin {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = coinRadius;
        this.rotation = Math.random() * Math.PI * 2;
        this.spinRate = Math.random() * 0.3 + 0.1;
      }

      update(dt) {
        this.vy += gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.rotation += this.spinRate;

        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.8; }
        if (this.x + this.r > canvas.width) { this.x = canvas.width - this.r; this.vx *= -0.8; }
        if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.8; }
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        const grad = ctx.createRadialGradient(-2, -2, 1, 0, 0, this.r);
        grad.addColorStop(0, '#ffeb3b');
        grad.addColorStop(1, '#fbc02d');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = '#d4af37';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.restore();
      }

      isOutOfBounds() {
        return this.y > canvas.height + 100;
      }

      checkCups() {
        for (let cup of cupPositions) {
          const dx = this.x - cup.x;
          const dy = this.y - cup.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 30) {
            return cup;
          }
        }
        return null;
      }
    }

    function throwCoin(fromX, fromY, toX, toY) {
      if (coin || coins <= 0) return;
      const dx = toX - fromX;
      const dy = toY - fromY;
      const speed = Math.sqrt(dx * dx + dy * dy) * 1.0;
      const angle = Math.atan2(dy, dx);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      coin = new Coin(fromX, fromY, vx, vy);
      coins--;
      coinsEl.textContent = coins;
    }

    function update(dt) {
      if (!gameActive) return;

      if (coins === 0 && !coin) {
        endGame();
        return;
      }

      if (coin) {
        coin.update(dt);

        const cup = coin.checkCups();
        if (cup) {
          score += cup.points;
          scoreEl.textContent = score;
          coin = null;
        }

        if (coin && coin.isOutOfBounds()) {
          coin = null;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw grass
      ctx.fillStyle = '#90ee90';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw cups
      for (let cup of cupPositions) {
        ctx.fillStyle = cup.color;
        ctx.beginPath();
        ctx.arc(cup.x, cup.y, 25, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(cup.points, cup.x, cup.y);
      }

      // Draw tray
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(tray.x - tray.r, tray.y - tray.r, tray.r * 2, tray.r * 2);
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 2;
      ctx.strokeRect(tray.x - tray.r, tray.y - tray.r, tray.r * 2, tray.r * 2);

      if (coin) {
        coin.draw(ctx);
      }
    }

    function endGame() {
      gameActive = false;
      finalScoreEl.textContent = score;
      modalEl.classList.add('open');
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!gameActive || coin) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const dx = x - tray.x;
      const dy = y - tray.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < tray.r * 1.5) {
        dragging = true;
        dragStart = { x, y };
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragStart) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        throwCoin(tray.x, tray.y, x, y);
        dragging = false;
        dragStart = null;
      }
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
