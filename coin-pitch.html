<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Pitch</title>
  <style>
    :root { --ink: #232308; --panel: rgba(255, 253, 221, .93); --accent: #a78616; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Trebuchet MS", "Verdana", sans-serif; color: var(--ink); background: radial-gradient(circle at 16% 16%, #fff0ab, transparent 30%), radial-gradient(circle at 82% 24%, #ffe29f, transparent 35%), linear-gradient(160deg, #ffe98a, #f0c95f 46%, #b68f2f); display: grid; place-items: center; padding: 18px; }
    .app { width: min(980px, 100%); background: var(--panel); border: 4px solid #fff; border-radius: 20px; box-shadow: 0 12px 24px rgba(20, 16, 35, .25); padding: 16px; }
    .top { display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    h1 { margin: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    .hud { display: flex; gap: 8px; flex-wrap: wrap; font-weight: 700; }
    .pill { background: #fff; border: 2px solid rgba(47,109,178,.3); border-radius: 999px; padding: 6px 10px; }
    canvas { width: 100%; height: auto; display: block; border-radius: 14px; border: 3px solid rgba(33,26,52,.18); background: linear-gradient(180deg, #ffd8a4 0%, #ef9b68 45%, #9b643f 100%); }
    .meta { margin-top: 10px; display: flex; justify-content: space-between; gap: 8px; flex-wrap: wrap; font-weight: 700; color: #3c3258; }
    .link { color: #224f87; text-decoration: none; border-bottom: 2px solid rgba(34,79,135,.35); }
    .overlay { position: fixed; inset: 0; background: rgba(16,12,26,.66); display: none; place-items: center; padding: 16px; }
    .overlay.open { display: grid; }
    .card { background: #fff4dc; border: 3px solid #fff; border-radius: 14px; padding: 14px; text-align: center; width: min(420px, 100%); }
    .btn { border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; background: #ffce48; color: #2f2a46; }
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <h1>Coin Pitch</h1>
      <div class="hud">
        <span class="pill">Score: <span id="score">0</span></span>
        <span class="pill">Coins: <span id="coins">14</span></span>
        <span class="pill">Goal: 420</span>
      </div>
    </section>
    <canvas id="gameCanvas" width="920" height="520" aria-label="Coin pitch game"></canvas>
    <section class="meta">
      <span id="status">Drag from the coin tray to toss.</span>
      <a class="link" href="empty.html">Back to Midway</a>
    </section>
  </main>

  <div class="overlay" id="overlay" aria-live="polite">
    <div class="card">
      <h2 id="resultTitle">Round Over</h2>
      <p>Final score: <strong id="finalScore">0</strong></p>
      <button class="btn" id="restartBtn" type="button">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const coinsEl = document.getElementById("coins");
    const statusEl = document.getElementById("status");
    const overlay = document.getElementById("overlay");
    const resultTitle = document.getElementById("resultTitle");
    const finalScore = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");

    const gravity = 760;
    const tray = { x: 120, y: 428, r: 40 };
    const cups = [
      { x: 620, y: 390, r: 34, pts: 50 },
      { x: 700, y: 365, r: 30, pts: 100 },
      { x: 780, y: 390, r: 34, pts: 50 },
      { x: 700, y: 310, r: 27, pts: 200 }
    ];

    let score = 0;
    let coins = 14;
    let coin = null;
    let ended = false;
    let dragging = false;
    let dragPos = null;
    let lastTime = performance.now();

    let audioCtx = null;
    let musicTimer = null;
    let beatStep = 0;
    const melody = [493.88, 523.25, 587.33, 659.25, 587.33, 523.25, 493.88, 440];
    const bass = [123.47, null, 130.81, null, 110, null, 98, null];

    function makeSprite(width, height, painter) {
      const sprite = document.createElement("canvas");
      sprite.width = width;
      sprite.height = height;
      const sctx = sprite.getContext("2d");
      painter(sctx, width, height);
      return sprite;
    }

    const coinSprite = makeSprite(24, 24, (sctx, w, h) => {
      sctx.fillStyle = "#f0c24d";
      sctx.beginPath();
      sctx.ellipse(w / 2, h / 2, 8, 6, 0, 0, Math.PI * 2);
      sctx.fill();
      sctx.strokeStyle = "#98772e";
      sctx.stroke();
    });

    function ensureAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      if (!audioCtx) audioCtx = new AudioContextClass();
      if (audioCtx.state === "suspended") audioCtx.resume();
      if (!musicTimer) musicTimer = window.setInterval(playMusicStep, 300);
    }

    function beep(freq, duration, type, gainValue) {
      if (!audioCtx || !freq) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(gainValue, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playMusicStep() {
      if (!audioCtx || audioCtx.state !== "running") return;
      const tone = melody[beatStep % melody.length];
      const low = bass[beatStep % bass.length];
      beep(tone, 0.22, "sine", 0.018);
      if (low) beep(low, 0.24, "triangle", 0.016);
      beatStep = (beatStep + 1) % melody.length;
    }

    function resetGame() {
      score = 0;
      coins = 14;
      coin = null;
      ended = false;
      dragging = false;
      dragPos = null;
      overlay.classList.remove("open");
      scoreEl.textContent = "0";
      coinsEl.textContent = "14";
      statusEl.textContent = "Drag from the coin tray to toss.";
    }

    function launch(vx, vy) {
      coin = { x: tray.x, y: tray.y, vx, vy, r: 8, spin: 0, scored: false };
    }

    function update(dt) {
      if (!coin || ended) return;

      coin.vy += gravity * dt;
      coin.vx *= 0.998;
      coin.x += coin.vx * dt;
      coin.y += coin.vy * dt;
      coin.spin += dt * Math.hypot(coin.vx, coin.vy) * 0.02;

      for (const cup of cups) {
        const d = Math.hypot(coin.x - cup.x, coin.y - cup.y);
        if (!coin.scored && d < cup.r - 5 && Math.hypot(coin.vx, coin.vy) < 240) {
          coin.scored = true;
          score += cup.pts;
          scoreEl.textContent = String(score);
          statusEl.textContent = `Cup made: +${cup.pts}`;
          ensureAudio();
          beep(760, 0.08, "triangle", 0.08);
          coin = null;
          checkEnd();
          return;
        }
      }

      if (coin.y > 500) {
        if (Math.abs(coin.vy) < 120) {
          coin = null;
          checkEnd();
          return;
        }
        coin.y = 500;
        coin.vy *= -0.25;
        coin.vx *= 0.75;
      }

      if (coin && (coin.x < -40 || coin.x > 970 || coin.y > 560)) {
        coin = null;
        checkEnd();
      }
    }

    function checkEnd() {
      if (coins > 0 || coin) return;
      ended = true;
      finalScore.textContent = String(score);
      resultTitle.textContent = score >= 420 ? "Sharp Pitching" : "Try Another Round";
      overlay.classList.add("open");
    }

    function drawCup(c) {
      ctx.fillStyle = "#5f3a27";
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2b1b12";
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r - 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 13px Verdana";
      ctx.textAlign = "center";
      ctx.fillText(String(c.pts), c.x, c.y + 4);
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r + 5, 0, Math.PI * 2);
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#fff1d5";
      ctx.fillRect(0, 0, canvas.width, 86);
      ctx.fillStyle = "#ca2d43";
      for (let i = 0; i < canvas.width; i += 64) ctx.fillRect(i, 0, 32, 86);

      ctx.fillStyle = "#855339";
      ctx.fillRect(0, 430, canvas.width, 90);

      for (const c of cups) drawCup(c);

      ctx.fillStyle = "#2f6db2";
      ctx.beginPath();
      ctx.arc(tray.x, tray.y, tray.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#fff";
      ctx.font = "bold 13px Verdana";
      ctx.textAlign = "center";
      ctx.fillText("COIN", tray.x, tray.y + 4);

      if (coin) {
        ctx.save();
        ctx.translate(coin.x, coin.y);
        ctx.rotate(coin.spin);
        ctx.drawImage(coinSprite, -12, -12);
        ctx.restore();
      }

      if (dragging && dragPos) {
        ctx.strokeStyle = "rgba(26, 57, 121, 0.6)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(tray.x, tray.y);
        ctx.lineTo(dragPos.x, dragPos.y);
        ctx.stroke();
      }
    }

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    function toCanvas(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((e.clientX - rect.left) / rect.width) * canvas.width,
        y: ((e.clientY - rect.top) / rect.height) * canvas.height
      };
    }

    canvas.addEventListener("pointerdown", (e) => {
      if (ended || coin || coins <= 0) return;
      ensureAudio();
      const p = toCanvas(e);
      if (Math.hypot(p.x - tray.x, p.y - tray.y) > tray.r + 8) return;
      dragging = true;
      dragPos = p;
    });

    canvas.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      dragPos = toCanvas(e);
    });

    canvas.addEventListener("pointerup", (e) => {
      if (!dragging || ended || coin || coins <= 0) return;
      dragging = false;
      const p = toCanvas(e);
      const dx = tray.x - p.x;
      const dy = tray.y - p.y;
      const launchVy = Math.min(dy * 3.7 - 130, -250);
      launch(dx * 3.8, launchVy);
      ensureAudio();
      beep(520, 0.07, "square", 0.07);
      coins -= 1;
      coinsEl.textContent = String(coins);
      dragPos = null;
    });

    restartBtn.addEventListener("click", resetGame);

    resetGame();
    draw();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
