<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milk Bottle Knockdown</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      min-height: 100vh; 
      font-family: "Trebuchet MS", Verdana, sans-serif; 
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .container {
      width: min(980px, 100%);
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      border: 3px solid #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 { margin: 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .stats {
      display: flex;
      gap: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    canvas {
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
      border-radius: 10px;
      display: block;
      margin: 15px 0;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .info {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      font-size: 1rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-weight: bold;
    }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      color: #333;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .modal-content h2 { margin: 0 0 15px; color: #667eea; font-size: 1.8rem; }
    .modal-content p { margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border: 0;
      border-radius: 10px;
      background: #667eea;
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: #5568d3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🥛 Milk Bottle Knockdown</h1>
      <div class="stats">
        <span>Down: <span id="score">0</span>/9</span>
        <span>Throws: <span id="throws">5</span></span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="info">Knock down all 9 bottles with your throws!</div>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Goal: 9 bottles</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Knocked Down: <span id="finalScore">0</span>/9</p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const throwsEl = document.getElementById('throws');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let throws = 5;
    let gameActive = true;
    let ball = null;
    let dragging = false;
    let dragStart = null;
    let lastFrame = Date.now();
    let bottles = [];

    const ballRack = { x: 100, y: 450, r: 30 };
    const gravity = 900;
    const ballRadius = 10;

    class Bottle {
      constructor(x, y, index) {
        this.x = x;
        this.y = y;
        this.r = 10;
        this.vx = 0;
        this.vy = 0;
        this.rotation = 0;
        this.rotationSpeed = 0;
        this.down = false;
        this.index = index;
      }

      update(dt) {
        if (this.down) {
          this.vy += gravity * dt;
          this.y += this.vy * dt;
          this.vx *= 0.98;
          this.x += this.vx * dt;
          this.rotation += this.rotationSpeed;
          this.rotationSpeed *= 0.98;

          if (this.y > canvas.height - 10) {
            this.y = canvas.height - 10;
            this.vy = 0;
            this.rotationSpeed = 0;
          }
        }
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        ctx.fillStyle = '#fff';
        ctx.fillRect(-6, -15, 12, 30);

        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-5, -12, 10, 8);

        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.strokeRect(-6, -15, 12, 30);

        ctx.restore();
      }

      knockDown() {
        if (!this.down) {
          this.down = true;
          this.vx = (Math.random() - 0.5) * 200;
          this.vy = -300 - Math.random() * 200;
          this.rotationSpeed = (Math.random() - 0.5) * 0.5;
          return true;
        }
        return false;
      }
    }

    class Ball {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = ballRadius;
      }

      update(dt) {
        this.vy += gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.8; }
        if (this.x + this.r > canvas.width) { this.x = canvas.width - this.r; this.vx *= -0.8; }
        if (this.y - this.r < 0) { this.y = this.r; this.vy *= -0.8; }
      }

      draw(ctx) {
        const grad = ctx.createRadialGradient(this.x - 3, this.y - 3, 2, this.x, this.y, this.r);
        grad.addColorStop(0, '#ff9999');
        grad.addColorStop(1, '#cc0000');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
      }

      isOutOfBounds() {
        return this.y > canvas.height + 100;
      }

      checkBottles() {
        for (let bottle of bottles) {
          if (bottle.down) continue;
          const dx = this.x - bottle.x;
          const dy = this.y - bottle.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < this.r + 15) {
            return bottle;
          }
        }
        return null;
      }
    }

    function throwBall(fromX, fromY, toX, toY) {
      if (ball || throws <= 0) return;
      const dx = toX - fromX;
      const dy = toY - fromY;
      const speed = Math.sqrt(dx * dx + dy * dy) * 1.0;
      const angle = Math.atan2(dy, dx);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      ball = new Ball(fromX, fromY, vx, vy);
      throws--;
      throwsEl.textContent = throws;
    }

    function initBottles() {
      bottles = [];
      const positions = [
        { x: 400, y: 200 },
        { x: 500, y: 200 },
        { x: 600, y: 200 },
        { x: 350, y: 260 },
        { x: 450, y: 260 },
        { x: 550, y: 260 },
        { x: 400, y: 320 },
        { x: 500, y: 320 },
        { x: 600, y: 320 }
      ];
      for (let i = 0; i < positions.length; i++) {
        bottles.push(new Bottle(positions[i].x, positions[i].y, i));
      }
    }

    function update(dt) {
      if (!gameActive) return;

      if (throws === 0 && !ball) {
        endGame();
        return;
      }

      if (ball) {
        ball.update(dt);

        const bottle = ball.checkBottles();
        if (bottle) {
          if (bottle.knockDown()) {
            score++;
            scoreEl.textContent = score;
          }
          ball = null;
        }

        if (ball && ball.isOutOfBounds()) {
          ball = null;
        }
      }

      for (let bottle of bottles) {
        bottle.update(dt);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw backdrop
      ctx.fillStyle = '#87ceeb';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#8B4513';
      ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

      // Draw target area
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.strokeRect(300, 150, 400, 250);
      ctx.setLineDash([]);

      // Draw bottles
      for (let bottle of bottles) {
        bottle.draw(ctx);
      }

      // Draw rack
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(ballRack.x - ballRack.r, ballRack.y - ballRack.r, ballRack.r * 2, ballRack.r * 2);
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.strokeRect(ballRack.x - ballRack.r, ballRack.y - ballRack.r, ballRack.r * 2, ballRack.r * 2);

      if (ball) {
        ball.draw(ctx);
      }
    }

    function endGame() {
      gameActive = false;
      finalScoreEl.textContent = score;
      modalEl.classList.add('open');
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!gameActive || ball) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const dx = x - ballRack.x;
      const dy = y - ballRack.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < ballRack.r * 1.5) {
        dragging = true;
        dragStart = { x, y };
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragStart) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        throwBall(ballRack.x, ballRack.y, x, y);
        dragging = false;
        dragStart = null;
      }
    });

    initBottles();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
