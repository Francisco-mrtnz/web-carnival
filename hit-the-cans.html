<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hit the Cans</title>
  <style>
    :root {
      --bg1: #ffe8a6;
      --bg2: #ffb576;
      --bg3: #cd5e41;
      --ink: #231937;
      --panel: rgba(255, 248, 230, 0.92);
      --accent: #c6283d;
      --throw-fill: #2f6db2;
      --throw-track: #d8e6f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 15% 18%, #fff3bf, transparent 34%),
                  radial-gradient(circle at 84% 22%, #ffd0ad, transparent 38%),
                  linear-gradient(160deg, var(--bg1), var(--bg2) 42%, var(--bg3));
      padding: 18px;
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }

    .lights {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-evenly;
      pointer-events: none;
      z-index: 0;
    }

    .lights span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-top: 8px;
      box-shadow: 0 0 10px currentColor;
      animation: twinkle 1.7s ease-in-out infinite;
    }

    .lights span:nth-child(3n + 1) { color: #f83b4e; background: #f83b4e; }
    .lights span:nth-child(3n + 2) { color: #ffe752; background: #ffe752; }
    .lights span:nth-child(3n + 3) { color: #5bb3ff; background: #5bb3ff; }

    @keyframes twinkle {
      0%, 100% { transform: scale(0.84); opacity: 0.58; }
      50% { transform: scale(1); opacity: 1; }
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(980px, 100%);
      background: repeating-linear-gradient(
        -34deg,
        rgba(255, 255, 255, 0.12),
        rgba(255, 255, 255, 0.12) 14px,
        rgba(255, 255, 255, 0) 14px,
        rgba(255, 255, 255, 0) 30px
      ),
      var(--panel);
      border-radius: 24px;
      border: 4px solid #fff;
      box-shadow: 0 14px 28px rgba(35, 25, 55, 0.3);
      padding: 18px;
    }

    .top {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .title {
      margin: 0;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #fff;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-weight: 700;
    }

    .pill {
      background: #fff;
      border: 2px solid rgba(47, 109, 178, 0.28);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .playzone {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid rgba(32, 26, 51, 0.2);
      background: #f8fafc;
      user-select: none;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #ffd89f 0%, #ffbd78 42%, #d26848 100%);
    }

    .charge-wrap {
      margin-top: 10px;
    }

    .charge-label {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 0.92rem;
      color: #3d3558;
    }

    .charge-track {
      height: 16px;
      border-radius: 999px;
      background: var(--throw-track);
      border: 2px solid rgba(47, 109, 178, 0.24);
      overflow: hidden;
    }

    .charge-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #49a6ff, var(--throw-fill));
      transition: width 60ms linear;
    }

    .instructions {
      margin: 10px 0 0;
      color: #433a61;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .scope-cursor {
      position: fixed;
      width: 40px;
      height: 40px;
      border: 2px solid rgba(31, 79, 136, 0.7);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      display: none;
      transform: translate(-50%, -50%);
    }

    .scope-cursor::before {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(31, 79, 136, 0.7);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .scope-cursor::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 12px;
      background: rgba(31, 79, 136, 0.7);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .side-charge-bar {
      position: fixed;
      width: 20px;
      height: 80px;
      background: rgba(216, 230, 247, 0.9);
      border: 2px solid rgba(47, 109, 178, 0.5);
      border-radius: 4px;
      pointer-events: none;
      z-index: 1000;
      display: none;
      transform: translateX(-100%);
      margin-left: -10px;
      overflow: hidden;
    }

    .side-charge-bar::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(180deg, #49a6ff, #2f6db2);
      transition: height 60ms linear;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .link {
      color: #1f4f88;
      text-decoration: none;
      border-bottom: 2px solid rgba(31, 79, 136, 0.3);
      font-weight: 700;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(22, 18, 36, 0.62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 2;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      width: min(430px, 100%);
      background: #fff6e1;
      border-radius: 16px;
      border: 3px solid #fff;
      box-shadow: 0 12px 24px rgba(20, 17, 36, 0.35);
      padding: 14px;
      text-align: center;
    }

    .modal h2 {
      margin: 0;
      color: #c4283c;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .modal p {
      margin: 10px 0;
      color: #362d53;
      font-weight: 700;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(32, 26, 51, 0.2);
    }

    .restart {
      background: #ffca43;
      color: #2f2a46;
    }

    .back {
      background: #2f6db2;
      color: #f4f9ff;
      text-decoration: none;
      display: inline-block;
    }

    @media (max-width: 760px) {
      .app {
        padding: 14px;
      }

      .instructions {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="lights" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <main class="app">
    <section class="top">
      <h1 class="title">Hit the Cans</h1>
      <div class="hud">
        <span class="pill">Score: <span id="score">0</span></span>
        <span class="pill">Throws Left: <span id="throwsLeft">5</span></span>
      </div>
    </section>

    <section class="playzone" id="playzone" aria-label="Hit the cans play area">
      <canvas id="gameCanvas" width="920" height="500"></canvas>
      <div class="overlay" id="gameOverOverlay" aria-live="polite">
        <div class="modal">
          <h2>Round Over</h2>
          <p>Your score: <span id="finalScore">0</span></p>
          <div class="btn-row">
            <button class="btn restart" id="restartBtn" type="button">Restart Game</button>
            <a class="btn back" href="empty.html">Back to Level Select</a>
          </div>
        </div>
      </div>
    </section>

    <div class="scope-cursor" id="scopeCursor"></div>
    <div class="side-charge-bar" id="sideChargeBar"></div>

    <section class="charge-wrap" aria-label="Throw strength">
      <div class="charge-label">
        <span>Hold mouse to charge throw</span>
        <span id="chargeValue">0%</span>
      </div>
      <div class="charge-track">
        <div class="charge-fill" id="chargeFill"></div>
      </div>
    </section>

    <p class="instructions">Click and hold to build throw power. Release to throw. You get 5 throws.</p>

    <section class="actions">
      <a class="link" href="empty.html">Back to Level Select</a>
      <span class="link" id="statusText">Click in the game area once to enable sound.</span>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const playzone = document.getElementById("playzone");
    const scoreEl = document.getElementById("score");
    const throwsLeftEl = document.getElementById("throwsLeft");
    const chargeFill = document.getElementById("chargeFill");
    const chargeValue = document.getElementById("chargeValue");
    const statusText = document.getElementById("statusText");
    const gameOverOverlay = document.getElementById("gameOverOverlay");
    const finalScoreEl = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");
    const scopeCursor = document.getElementById("scopeCursor");
    const sideChargeBar = document.getElementById("sideChargeBar");

    const groundY = 430;
    const stackBaseY = 390;
    const canW = 44;
    const canH = 30;
    const ballRadius = 12;
    const gravity = 820;
    const maxZ = 500; // Maximum depth (where cans are)
    const playerZ = 0; // Player position (front of booth)

    let score = 0;
    let throwsLeft = 5;
    let cans = [];
    let balls = [];
    let isCharging = false;
    let chargeStrength = 0;
    let chargeStart = 0;
    let lastPointer = { x: canvas.width / 2, y: 140 };
    let gameOver = false;
    let lastTime = performance.now();

    let audioCtx = null;
    let musicTimer = null;
    let rhythmStep = 0;

    const melody = [392, 440, 523.25, 440, 392, 349.23, 392, 440];
    const bass = [130.81, null, 130.81, null, 146.83, null, 123.47, null];

    function ensureAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        statusText.textContent = "Audio is not supported in this browser.";
        return;
      }

      if (!audioCtx) {
        audioCtx = new AudioContextClass();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      if (!musicTimer) {
        musicTimer = window.setInterval(playMusicStep, 280);
      }

      statusText.textContent = "Stall band is playing.";
    }

    function makeBeep(freq, duration, type, gainValue) {
      if (!audioCtx || !freq) {
        return;
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(gainValue, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function playMusicStep() {
      if (!audioCtx || audioCtx.state !== "running") {
        return;
      }

      const tone = melody[rhythmStep % melody.length];
      const low = bass[rhythmStep % bass.length];

      makeBeep(tone, 0.2, "square", 0.028);
      if (low) {
        makeBeep(low, 0.22, "triangle", 0.024);
      }

      rhythmStep = (rhythmStep + 1) % melody.length;
    }

    function playThrowSound() {
      makeBeep(520, 0.07, "triangle", 0.07);
      window.setTimeout(() => makeBeep(680, 0.09, "triangle", 0.08), 45);
    }

    function playHitSound() {
      makeBeep(760, 0.05, "sine", 0.08);
      window.setTimeout(() => makeBeep(580, 0.08, "sine", 0.06), 30);
    }

    function createStack(centerX, levels, tenPointLevel) {
      const stack = [];
      for (let i = 0; i < levels; i += 1) {
        stack.push({
          x: centerX - canW / 2,
          y: stackBaseY - (i + 1) * canH,
          z: maxZ,
          w: canW,
          h: canH,
          vx: 0,
          vy: 0,
          vz: 0,
          knocked: false,
          scored: false,
          value: i === tenPointLevel ? 10 : 5
        });
      }
      return stack;
    }

    function resetGame() {
      score = 0;
      throwsLeft = 5;
      balls = [];
      gameOver = false;
      isCharging = false;
      chargeStrength = 0;
      chargeFill.style.width = "0%";
      chargeValue.textContent = "0%";
      gameOverOverlay.classList.remove("open");
      scopeCursor.style.display = 'none';
      sideChargeBar.style.display = 'none';

      cans = [
        ...createStack(300, 3, -1),
        ...createStack(460, 5, 2),
        ...createStack(620, 3, -1)
      ];

      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = String(score);
      throwsLeftEl.textContent = String(throwsLeft);
    }

    function drawStallBackdrop() {
      // 3D booth floor - gradient from front to back
      const gradient = ctx.createLinearGradient(0, groundY, 0, canvas.height);
      gradient.addColorStop(0, "#a8623f");
      gradient.addColorStop(1, "#5d3821");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

      // Side walls with perspective
      ctx.fillStyle = "rgba(139, 69, 19, 0.3)";
      ctx.beginPath();
      ctx.moveTo(0, groundY);
      ctx.lineTo(0, 0);
      ctx.lineTo(canvas.width * 0.15, groundY * 0.3);
      ctx.lineTo(canvas.width * 0.15, canvas.height);
      ctx.fill();
      
      ctx.beginPath();
      ctx.moveTo(canvas.width, groundY);
      ctx.lineTo(canvas.width, 0);
      ctx.lineTo(canvas.width * 0.85, groundY * 0.3);
      ctx.lineTo(canvas.width * 0.85, canvas.height);
      ctx.fill();

      // Depth lines for perspective
      ctx.strokeStyle = "rgba(255,255,255,0.1)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        const y = groundY + (canvas.height - groundY) * (i / 4);
        const x1 = canvas.width * 0.15;
        const x2 = canvas.width * 0.85;
        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.stroke();
      }

      // Top booth frame
      ctx.fillStyle = "#fff0d0";
      ctx.fillRect(0, 0, canvas.width, 86);

      ctx.fillStyle = "#c42b40";
      for (let i = 0; i < canvas.width; i += 64) {
        ctx.fillRect(i, 0, 32, 86);
      }
    }

    function drawCan(can) {
      // Calculate size based on depth
      const sizeScale = Math.max(0.3, 1 - (can.z / maxZ) * 0.7);
      const w = can.w * sizeScale;
      const h = can.h * sizeScale;
      
      // Keep original Y position (cans on flat ground), center scaled size on original position
      const x = can.x - (can.w - w) / 2;
      const y = can.y - (can.h - h) / 2;
      
      ctx.fillStyle = can.value === 10 ? "#ffd34e" : "#d7e5f7";
      ctx.fillRect(x, y, w, h);

      ctx.strokeStyle = "#2f5d95";
      ctx.lineWidth = Math.max(1, 2 * sizeScale);
      ctx.strokeRect(x, y, w, h);

      ctx.fillStyle = "rgba(255,255,255,0.65)";
      ctx.fillRect(x + 3 * sizeScale, y + 3 * sizeScale, w - 6 * sizeScale, 4 * sizeScale);

      ctx.fillStyle = "#2c2a43";
      ctx.font = `bold ${Math.max(8, 13 * sizeScale)}px Verdana`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(can.value), x + w / 2, y + h / 2);
    }

    function drawBall(ball) {
      // Calculate size based on depth (z-coordinate)
      // At z=0 (front): full size
      // At z=maxZ (back): very small
      const sizeScale = Math.max(0.2, 1 - (ball.z / maxZ) * 0.8);
      const radius = ballRadius * sizeScale;
      
      ctx.beginPath();
      ctx.fillStyle = "#4f90d5";
      ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.closePath();

      ctx.beginPath();
      ctx.strokeStyle = "rgba(255,255,255,0.65)";
      ctx.lineWidth = Math.max(1, 2 * sizeScale);
      ctx.arc(ball.x - 2, ball.y - 2, Math.max(0.5, radius - 4), 0, Math.PI * 2);
      ctx.stroke();
      ctx.closePath();
    }

    function updatePhysics(dt) {
      for (const ball of balls) {
        // Move ball along z-axis at constant speed
        ball.z += ball.vz * dt;
        
        // Apply gravity to vertical velocity
        ball.vy += gravity * dt;
        
        // Update x and y positions
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Stop if below ground
        if (ball.y >= groundY) {
          ball.y = groundY;
          ball.vy = 0;
          ball.vx *= 0.92;
          ball.vz *= 0.92;
        }
      }

      // Filter balls that have passed through the cans or gone out of bounds
      balls = balls.filter((ball) => ball.z < maxZ + 100);

      for (const can of cans) {
        if (can.knocked) {
          can.vy += gravity * dt;
          can.vx *= 0.92;
          can.vz *= 0.92;
          can.x += can.vx * dt;
          can.y += can.vy * dt;
          can.z += can.vz * dt;
          
          const screenY = groundY - (can.z / maxZ) * (groundY - 100);
          const sizeScale = Math.max(0.3, 1 - (can.z / maxZ) * 0.7);
          if (can.y >= groundY) {
            can.y = groundY;
            can.vy *= -0.2;
            if (Math.abs(can.vy) < 20) {
              can.vy = 0;
            }
          }
          continue;
        }

        for (const ball of balls) {
          // 3D collision detection
          const ballRadius3D = ballRadius * Math.max(0.2, 1 - (ball.z / maxZ) * 0.8);
          const canSizeScale = Math.max(0.3, 1 - (can.z / maxZ) * 0.7);
          const canW3D = can.w * canSizeScale;
          
          // Check if z-values are close (within collision range)
          const zDiff = Math.abs(ball.z - can.z);
          if (zDiff < 80) {
            const nearestX = Math.max(can.x, Math.min(ball.x, can.x + canW3D));
            const dx = ball.x - nearestX;
            if (dx * dx <= ballRadius3D * ballRadius3D) {
              can.knocked = true;
              can.vx = ball.vx * 0.4;
              can.vz = ball.vz * 0.3;
              can.vy = -100;
              ball.vx *= 0.3;
              ball.vy *= -0.3;
              if (!can.scored) {
                can.scored = true;
                score += can.value;
                updateHud();
              }
              playHitSound();
              break;
            }
          }
        }
      }
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStallBackdrop();
      for (const can of cans) {
        drawCan(can);
      }
      for (const ball of balls) {
        drawBall(ball);
      }
    }

    function endGameIfNeeded() {
      if (throwsLeft <= 0 && balls.length === 0 && !gameOver) {
        gameOver = true;
        finalScoreEl.textContent = String(score);
        gameOverOverlay.classList.add("open");
      }
    }

    function gameLoop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;

      updatePhysics(dt);
      render();
      endGameIfNeeded();

      requestAnimationFrame(gameLoop);
    }

    function clientToCanvas(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width) * canvas.width;
      const y = ((clientY - rect.top) / rect.height) * canvas.height;
      return { x, y };
    }

    function startCharge(clientX, clientY) {
      if (gameOver || throwsLeft <= 0) {
        return;
      }
      ensureAudio();
      isCharging = true;
      chargeStart = performance.now();
      lastPointer = clientToCanvas(clientX, clientY);
      scopeCursor.style.display = 'block';
      sideChargeBar.style.display = 'block';
      scopeCursor.style.left = clientX + 'px';
      scopeCursor.style.top = clientY + 'px';
      sideChargeBar.style.left = clientX + 'px';
      sideChargeBar.style.top = clientY + 'px';
    }

    function updateCharge(clientX, clientY) {
      if (!isCharging) {
        return;
      }
      lastPointer = clientToCanvas(clientX, clientY);
      const elapsed = performance.now() - chargeStart;
      chargeStrength = Math.min(1, elapsed / 1400);
      const pct = Math.round(chargeStrength * 100);
      chargeFill.style.width = `${pct}%`;
      chargeValue.textContent = `${pct}%`;
      
      // Update scope cursor and side charge bar positions
      scopeCursor.style.left = clientX + 'px';
      scopeCursor.style.top = clientY + 'px';
      sideChargeBar.style.left = clientX + 'px';
      sideChargeBar.style.top = clientY + 'px';
      
      // Update the fill height of the side charge bar
      const barFill = sideChargeBar.querySelector('::before') || sideChargeBar;
      sideChargeBar.style.setProperty('--charge-height', `${pct}%`);
      // Update the pseudo-element height directly through CSS
      const style = document.createElement('style');
      style.textContent = `.side-charge-bar::before { height: ${pct}% !important; }`;
      // Instead, update through inline style property
      if (!window.chargeFillStyle) {
        window.chargeFillStyle = document.createElement('style');
        document.head.appendChild(window.chargeFillStyle);
      }
      window.chargeFillStyle.textContent = `.side-charge-bar::before { height: ${pct}% !important; }`;
    }

    function releaseThrow() {
      if (!isCharging || gameOver || throwsLeft <= 0) {
        return;
      }

      isCharging = false;
      scopeCursor.style.display = 'none';
      sideChargeBar.style.display = 'none';
      const throwPower = Math.max(0.1, chargeStrength);
      
      // Ball starts from center of screen
      const originX = canvas.width / 2;
      const originY = canvas.height / 2;
      const originZ = playerZ;
      
      // Forward velocity (toward cans) - higher with more power
      const baseVz = 250 + throwPower * 450;
      
      // Time to reach cans
      const timeToReachCans = maxZ / baseVz;
      
      // Ball should travel to where the cursor is pointing at can depth
      // Calculate required velocities to reach cursor position at can depth
      const cursorX = lastPointer.x;
      const cursorY = lastPointer.y;
      
      // Horizontal velocity - travel from center to cursor horizontal position
      const vx = (cursorX - originX) / timeToReachCans;
      
      // Vertical velocity - accounting for gravity
      // y = y0 + vy*t - 0.5*g*t^2
      // We want: cursorY = originY + vy*t - 0.5*g*t^2
      // Solve for vy: vy = (cursorY - originY + 0.5*g*t^2) / t
      const vy = ((cursorY - originY) + 0.5 * gravity * timeToReachCans * timeToReachCans) / timeToReachCans;
      
      // Add inaccuracy based on charge strength
      const maxSpreadX = 30;
      const maxSpreadY = 20;
      const spreadFactor = 1 - throwPower;
      const vxNoise = (Math.random() - 0.5) * 2 * maxSpreadX * spreadFactor;
      const vyNoise = (Math.random() - 0.5) * 2 * maxSpreadY * spreadFactor;
      
      const ball = {
        x: originX,
        y: originY,
        z: originZ,
        vx: vx + vxNoise,
        vy: vy + vyNoise,
        vz: baseVz
      };

      balls.push(ball);
      throwsLeft -= 1;
      chargeStrength = 0;
      chargeFill.style.width = "0%";
      chargeValue.textContent = "0%";
      updateHud();
      playThrowSound();
    }

    playzone.addEventListener("pointerdown", (event) => {
      startCharge(event.clientX, event.clientY);
    });

    playzone.addEventListener("pointermove", (event) => {
      updateCharge(event.clientX, event.clientY);
    });

    window.addEventListener("pointerup", () => {
      releaseThrow();
    });

    restartBtn.addEventListener("click", () => {
      resetGame();
    });

    resetGame();
    render();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
