<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balloon Darts</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      min-height: 100vh; 
      font-family: "Trebuchet MS", Verdana, sans-serif; 
      color: #fff5f2;
      background: linear-gradient(135deg, #ff3d5f 0%, #ff6b6b 25%, #ffa94d 75%, #ffb84d 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .container {
      width: min(980px, 100%);
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
      border: 3px solid #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }
    h1 { margin: 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .stats {
      display: flex;
      gap: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    canvas {
      width: 100%;
      height: auto;
      background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
      border-radius: 10px;
      display: block;
      margin: 15px 0;
      border: 2px solid rgba(0,0,0,0.1);
    }
    .info {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
      font-size: 1rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      font-weight: bold;
    }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      color: #333;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .modal-content h2 { margin: 0 0 15px; color: #ff3d5f; font-size: 1.8rem; }
    .modal-content p { margin: 10px 0; font-size: 1.2rem; font-weight: bold; }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: bold;
      border: 0;
      border-radius: 10px;
      background: #ff3d5f;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #ff1a3f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎈 Balloon Darts</h1>
      <div class="stats">
        <span>Score: <span id="score">0</span></span>
        <span>Time: <span id="timer">45</span>s</span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="info">Click and drag from the dart tray to throw. Pop balloons!</div>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Goal: 500 pts</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Final Score: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let timeLeft = 45;
    let gameActive = true;
    let darts = [];
    let balloons = [];
    let dragging = false;
    let dragStart = null;
    let startTime = Date.now();
    let lastFrame = Date.now();

    const dartTray = { x: 100, y: 450, r: 30 };
    const gravity = 800;

    class Balloon {
      constructor() {
        this.x = Math.random() * (canvas.width - 100) + 50;
        this.y = Math.random() * 200 + 50;
        this.r = Math.random() * 15 + 15;
        this.color = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff', '#44ffff'][Math.floor(Math.random() * 6)];
        this.vx = (Math.random() - 0.5) * 150;
        this.vy = (Math.random() - 0.5) * 100;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vy += gravity * dt * 0.1;

        if (this.x - this.r < 0 || this.x + this.r > canvas.width) this.vx *= -0.9;
        if (this.y - this.r < 0) this.vy = Math.abs(this.vy);
        if (this.y + this.r > canvas.height) this.y = canvas.height - this.r;
        
        this.x = Math.max(this.r, Math.min(canvas.width - this.r, this.x));
      }

      draw(ctx) {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.r);
        ctx.lineTo(this.x, this.y + this.r + 10);
        ctx.stroke();
      }
    }

    class Dart {
      constructor(x, y, vx, vy) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.r = 5;
        this.age = 0;
      }

      update(dt) {
        this.vy += gravity * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.age += dt;
      }

      draw(ctx) {
        ctx.fillStyle = '#333';
        ctx.fillRect(this.x - 2, this.y - 8, 4, 16);
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 10);
        ctx.lineTo(this.x + 4, this.y - 5);
        ctx.lineTo(this.x - 4, this.y - 5);
        ctx.closePath();
        ctx.fill();
      }

      isOutOfBounds() {
        return this.y > canvas.height + 100 || this.age > 15;
      }
    }

    function throwDart(fromX, fromY, toX, toY) {
      const dx = toX - fromX;
      const dy = toY - fromY;
      const speed = Math.sqrt(dx * dx + dy * dy) * 1.2;
      const angle = Math.atan2(dy, dx);
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      darts.push(new Dart(fromX, fromY, vx, vy));
    }

    function update(dt) {
      if (!gameActive) return;

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timeLeft = Math.max(0, 45 - elapsed);
      timerEl.textContent = timeLeft;

      if (timeLeft === 0) {
        endGame();
        return;
      }

      for (let i = darts.length - 1; i >= 0; i--) {
        const dart = darts[i];
        dart.update(dt);
        
        for (let j = balloons.length - 1; j >= 0; j--) {
          const balloon = balloons[j];
          const dx = dart.x - balloon.x;
          const dy = dart.y - balloon.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < balloon.r + dart.r) {
            score += 50;
            scoreEl.textContent = score;
            balloons.splice(j, 1);
            darts.splice(i, 1);
            break;
          }
        }
      }

      darts = darts.filter(d => !d.isOutOfBounds());

      for (let balloon of balloons) {
        balloon.update(dt);
      }

      if (Math.random() < 0.08 && balloons.length < 10) {
        balloons.push(new Balloon());
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let balloon of balloons) {
        balloon.draw(ctx);
      }

      for (let dart of darts) {
        dart.draw(ctx);
      }

      ctx.fillStyle = '#8B4513';
      ctx.fillRect(dartTray.x - dartTray.r, dartTray.y - dartTray.r, dartTray.r * 2, dartTray.r * 2);
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 2;
      ctx.strokeRect(dartTray.x - dartTray.r, dartTray.y - dartTray.r, dartTray.r * 2, dartTray.r * 2);
    }

    function endGame() {
      gameActive = false;
      finalScoreEl.textContent = score;
      modalEl.classList.add('open');
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!gameActive) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);
      const dx = x - dartTray.x;
      const dy = y - dartTray.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < dartTray.r * 1.5) {
        dragging = true;
        dragStart = { x, y };
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (dragging && dragStart) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        throwDart(dartTray.x, dartTray.y, x, y);
        dragging = false;
        dragStart = null;
      }
    });

    for (let i = 0; i < 5; i++) {
      balloons.push(new Balloon());
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
