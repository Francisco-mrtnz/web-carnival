<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duck Hunt</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: "Trebuchet MS", Verdana, sans-serif; color: #fff; background: linear-gradient(135deg, #667eea, #764ba2); display: grid; place-items: center; padding: 20px; }
    .container { width: min(980px, 100%); background: rgba(0,0,0,0.3); border-radius: 20px; border: 3px solid #fff; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px; }
    h1 { margin: 0; font-size: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .stats { display: flex; gap: 15px; font-weight: bold; }
    canvas { width: 100%; height: auto; background: linear-gradient(180deg, #87ceeb, #e0f6ff); border-radius: 10px; display: block; margin: 15px 0; cursor: crosshair; }
    .footer { display: flex; justify-content: space-between; gap: 15px; font-weight: bold; }
    a { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content { background: #fff; border-radius: 15px; padding: 30px; text-align: center; color: #333; max-width: 400px; }
    .modal-content h2 { margin: 0 0 15px; color: #667eea; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 1rem; font-weight: bold; border: 0; border-radius: 10px; background: #667eea; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🦆 Duck Hunt</h1>
      <div class="stats">
        <span>Ducks Hit: <span id="score">0</span></span>
        <span>Time: <span id="timer">30</span>s</span>
      </div>
    </div>
    <canvas id="canvas" width="920" height="520"></canvas>
    <div class="footer">
      <a href="empty.html">← Back</a>
      <span>Click flying ducks!</span>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <p>Ducks Shot: <span id="finalScore">0</span></p>
      <button onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const modalEl = document.getElementById('modal');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let timeLeft = 30;
    let gameActive = true;
    let ducks = [];
    let startTime = Date.now();
    let lastFrame = Date.now();

    class Duck {
      constructor() {
        this.x = Math.random() < 0.5 ? -50 : canvas.width + 50;
        this.y = Math.random() * 300 + 50;
        this.vx = this.x < canvas.width / 2 ? Math.random() * 200 + 100 : -(Math.random() * 200 + 100);
        this.vy = (Math.random() - 0.5) * 50;
        this.r = 20;
        this.alive = true;
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
      }

      draw(ctx) {
        if (!this.alive) return;
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(this.x + 8, this.y - 8, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      isOutOfBounds() {
        return this.x < -100 || this.x > canvas.width + 100;
      }

      checkHit(x, y) {
        if (!this.alive) return false;
        const dx = x - this.x;
        const dy = y - this.y;
        if (Math.sqrt(dx * dx + dy * dy) < this.r + 15) {
          this.alive = false;
          return true;
        }
        return false;
      }
    }

    function update(dt) {
      if (!gameActive) return;

      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      timeLeft = Math.max(0, 30 - elapsed);
      timerEl.textContent = timeLeft;

      if (timeLeft === 0) {
        gameActive = false;
        finalScoreEl.textContent = score;
        modalEl.classList.add('open');
        return;
      }

      for (let duck of ducks) {
        duck.update(dt);
      }

      ducks = ducks.filter(d => !d.isOutOfBounds());

      if (Math.random() < 0.08) {
        ducks.push(new Duck());
      }
    }

    function draw() {
      ctx.fillStyle = '#87ceeb';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let duck of ducks) {
        duck.draw(ctx);
      }
    }

    function gameLoop() {
      const now = Date.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.033);
      lastFrame = now;

      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    canvas.addEventListener('click', (e) => {
      if (!gameActive) return;
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (canvas.height / rect.height);

      for (let duck of ducks) {
        if (duck.checkHit(x, y)) {
          score++;
          scoreEl.textContent = score;
          break;
        }
      }
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
